<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background Circle -->
    <circle cx="32" cy="32" r="32" fill="url(#iconGradient)" />

    <!-- Calendar Icon -->
    <!-- Top bar -->
    <rect x="16" y="14" width="32" height="6" rx="2" fill="white" opacity="0.95" />

    <!-- Main calendar body -->
    <rect x="16" y="22" width="32" height="28" rx="3" fill="white" opacity="0.95" />

    <!-- Grid dots representing dates -->
    <circle cx="22" cy="28" r="1.5" fill="#60a5fa" />
    <circle cx="28" cy="28" r="1.5" fill="#60a5fa" />
    <circle cx="34" cy="28" r="1.5" fill="#60a5fa" />
    <circle cx="40" cy="28" r="1.5" fill="#60a5fa" />

    <circle cx="22" cy="34" r="1.5" fill="#a78bfa" />
    <circle cx="28" cy="34" r="1.5" fill="#a78bfa" />
    <circle cx="34" cy="34" r="1.5" fill="#a78bfa" />
    <circle cx="40" cy="34" r="1.5" fill="#a78bfa" />

    <circle cx="22" cy="40" r="1.5" fill="#f472b6" />
    <circle cx="28" cy="40" r="1.5" fill="#f472b6" />
    <circle cx="34" cy="40" r="1.5" fill="#f472b6" />
    <circle cx="40" cy="40" r="1.5" fill="#f472b6" />

    <circle cx="22" cy="46" r="1.5" fill="#60a5fa" />
    <circle cx="28" cy="46" r="1.5" fill="#60a5fa" />
</svg>